name: Accuracy harness

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare artifacts dir
        shell: bash
        run: mkdir -p artifacts
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Unit tests
        run: python -m pytest tests/unit -q --junitxml=artifacts/junit-unit.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-unit-${{ matrix.os }}
          path: artifacts/

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare artifacts dir
        shell: bash
        run: mkdir -p artifacts
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Start compose stack
        run: |
          docker compose -f tests/compose/docker-compose.yml up -d
          sleep 5
      - name: Integration tests (hermetic)
        env:
          BOOMSTICK_RUN_INTEGRATION: "1"
          TEST_DNS_PORT: "5353"
          TEST_WEB_ORIGIN: "http://127.0.0.1:18080"
        run: python -m pytest tests/integration -q --junitxml=artifacts/junit-integration.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accuracy-artifacts
          path: artifacts/
