# Authoritative-like answers for boomStick harness zone (local only).
no-resolv
no-hosts
bind-interfaces
listen-address=0.0.0.0

# Apex + hosts (integration expects these names)
address=/boomstick.test/127.0.0.1
address=/www.boomstick.test/127.0.0.1
address=/api.boomstick.test/127.0.0.1

txt-record=boomstick.test,"boomstick-accuracy-v1"
mx-host=boomstick.test,mail.boomstick.test,10
address=/mail.boomstick.test/127.0.0.1
