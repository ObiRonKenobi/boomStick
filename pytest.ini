[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    integration: requires local Docker compose stack (BOOMSTICK_RUN_INTEGRATION=1)
    accuracy_id: stable ID for Cursor-actionable reports (pass id string)
    network: tests that use real sockets (may be skipped in sandbox)
addopts = -ra -q
